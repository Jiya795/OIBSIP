<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — SecureVault</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="10" width="16" height="11" rx="2" stroke="#2dd4bf" stroke-width="1.8"/>
      <path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="#2dd4bf" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="12" cy="15" r="1.6" fill="#2dd4bf"/>
    </svg>
    <span>Secure<span class="accent">Vault</span></span>
  </div>

  <div class="card">
    <h1>Welcome back</h1>
    <p class="sub">Log in with the account you registered.</p>

    <div class="alert error" id="formAlert"></div>

    <form id="loginForm" novalidate>
      <div class="field" id="usernameField">
        <label for="username">Username or email</label>
        <input type="text" id="username" autocomplete="username" placeholder="e.g. jiya_gupta">
        <div class="field-error"></div>
      </div>

      <div class="field" id="passwordField">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="Your password">
        <div class="field-error"></div>
      </div>

      <button type="submit" class="btn-primary">Login</button>
    </form>

    <p class="switch-link">Don't have an account? <a href="register.html">Register</a></p>
  </div>

  <footer>Made for the OIBSIP Web Dev · Level 2 · Task 4</footer>
</div>

<script src="auth.js"></script>
<script>
  redirectIfLoggedIn();

  const form = document.getElementById('loginForm');
  const usernameField = document.getElementById('usernameField');
  const passwordField = document.getElementById('passwordField');
  const formAlert = document.getElementById('formAlert');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert(formAlert);
    [usernameField, passwordField].forEach(clearFieldError);

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    let hasError = false;

    const usernameCheck = validateUsername(username);
    if (!usernameCheck.valid) {
      showFieldError(usernameField, usernameCheck.message);
      hasError = true;
    }

    if (!password) {
      showFieldError(passwordField, 'Password is required.');
      hasError = true;
    }

    if (hasError) return;

    const user = findUser(username);
    const passwordHash = await hashPassword(password);

    if (!user || user.passwordHash !== passwordHash) {
      showAlert(formAlert, 'Incorrect username/email or password.', 'error');
      return;
    }

    setSession(user.username);
    window.location.href = 'dashboard.html';
  });
</script>

</body>
</html>
